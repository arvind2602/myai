<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Virtual Companion</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06040a 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(138, 43, 226, 0.4);
            --color-primary: #8a2be2;
            --color-secondary: #00f0ff;
            --text-light: #f5f5f7;
            --text-muted: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Glassmorphic Container */
        .app-container {
            width: 90%;
            max-width: 480px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        0 0 50px var(--accent-glow);
            text-align: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #8a2be2, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        /* Character/Avatar Video Container */
        .avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #110d21;
            position: relative;
        }

        .avatar-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        /* Pulse ring animation around avatar when active */
        .avatar-container::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid var(--color-secondary);
            opacity: 0;
            transition: all 0.5s ease;
        }

        .avatar-container.listening::after {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
            opacity: 0.6;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.15); opacity: 0; }
        }

        /* Chat bubble display */
        .status-display {
            font-size: 0.95rem;
            min-height: 24px;
            color: var(--color-secondary);
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .transcript-bubble {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            max-height: 120px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.95rem;
            color: #ddd;
        }

        .transcript-bubble::-webkit-scrollbar {
            width: 4px;
        }
        .transcript-bubble::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        /* Control Buttons */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-record {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff007f, #8a2be2);
            box-shadow: 0 8px 24px rgba(255, 0, 127, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
        }

        .btn-record:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(255, 0, 127, 0.5);
        }

        .btn-record.recording {
            background: #ff0000;
            animation: recording-glow 1.2s infinite alternate;
        }

        @keyframes recording-glow {
            0% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
            100% { box-shadow: 0 0 30px rgba(255, 0, 0, 0.9); }
        }

        .btn-reset {
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Character Select Options */
        .character-select {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .character-select select {
            background: #110d21;
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 6px 12px;
            border-radius: 8px;
            margin-left: 8px;
            outline: none;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .app-container {
                padding: 20px;
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 id="app-title">My AI Bestie</h1>
            <p>Your interactive personalized companion</p>
        </header>

        <!-- Dynamic Visual Avatar -->
        <div class="avatar-container" id="avatar-box">
            <div class="avatar-wrapper">
                <video class="avatar-video" id="avatar-player" loop muted autoplay playsinline>
                    <source id="video-src" src="/static/videos/ue.mp4" type="video/mp4">
                    Your browser does not support HTML5 video.
                </video>
            </div>
        </div>

        <div class="status-display" id="status-text">Ready</div>

        <!-- Chat history/transcript box -->
        <div class="transcript-bubble" id="transcript-box">
            Click the microphone and start speaking to your companion...
        </div>

        <div class="controls">
            <button class="btn btn-reset" id="btn-reset">Reset Chat</button>
            <button class="btn btn-record" id="btn-record" aria-label="Record voice">
                <!-- SVG Microphone Icon -->
                <svg id="mic-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
        </div>

        <div class="character-select">
            <label for="companion-model">Choose Avatar:</label>
            <select id="companion-model">
                <option value="ue.mp4">Default (UE)</option>
                <option value="anime1.mp4">Anime Girl 1</option>
                <option value="anime3.mp4">Anime Girl 2</option>
            </select>
        </div>
    </div>

    <!-- Hidden audio element for speech playback -->
    <audio id="speech-player" style="display: none;"></audio>

    <script>
        const btnRecord = document.getElementById('btn-record');
        const btnReset = document.getElementById('btn-reset');
        const statusText = document.getElementById('status-text');
        const transcriptBox = document.getElementById('transcript-box');
        const avatarBox = document.getElementById('avatar-box');
        const avatarPlayer = document.getElementById('avatar-player');
        const videoSrc = document.getElementById('video-src');
        const speechPlayer = document.getElementById('speech-player');
        const companionModel = document.getElementById('companion-model');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        // Visual state mapping helper
        function setUIState(state) {
            statusText.innerText = state;
            switch(state) {
                case 'Listening':
                    avatarBox.className = 'avatar-container listening';
                    break;
                case 'Thinking':
                    avatarBox.className = 'avatar-container';
                    // We can loop faster or slightly speed up video to show active status
                    avatarPlayer.playbackRate = 1.5;
                    break;
                case 'Speaking':
                    avatarBox.className = 'avatar-container';
                    avatarPlayer.playbackRate = 1.0;
                    break;
                default:
                    avatarBox.className = 'avatar-container';
                    avatarPlayer.playbackRate = 0.8; // Relaxed speed for idle
            }
        }

        // Change Avatar template video client-side
        companionModel.addEventListener('change', () => {
            const newSrc = `/static/videos/${companionModel.value}`;
            videoSrc.src = newSrc;
            avatarPlayer.load();
            avatarPlayer.play();
        });

        // Initialize Audio Recording
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    await sendAudioToBackend(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;
                btnRecord.classList.add('recording');
                setUIState('Listening');
                transcriptBox.innerText = "Listening to you...";
            } catch (err) {
                console.error('Microphone access denied:', err);
                alert('Please allow microphone permissions to chat.');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                btnRecord.classList.remove('recording');
                setUIState('Thinking');
            }
        }

        // Click Handler for Mic Button
        btnRecord.addEventListener('click', () => {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        });

        // Click Handler for Reset
        btnReset.addEventListener('click', async () => {
            if (confirm('Are you sure you want to clear chat history?')) {
                try {
                    const res = await fetch('/api/reset-history/', { method: 'POST' });
                    const data = await res.json();
                    if (data.success) {
                        transcriptBox.innerHTML = "Conversation history has been reset. Speak to your companion.";
                        setUIState('Ready');
                    }
                } catch (e) {
                    console.error('Reset failed:', e);
                }
            }
        });

        // Send Audio Blob to Django Endpoint
        async function sendAudioToBackend(audioBlob) {
            const formData = new FormData();
            formData.append('audio', audioBlob, 'user_voice.wav');

            try {
                const response = await fetch('/api/process-voice/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    transcriptBox.innerHTML = `<strong>You:</strong> ${data.transcript}<br><br><strong>Companion:</strong> ${data.reply}`;
                    playSpeech(data.audio_url);
                } else {
                    transcriptBox.innerText = `Error: ${data.error || 'Failed to process audio'}`;
                    setUIState('Ready');
                }
            } catch (error) {
                console.error('Error sending audio:', error);
                transcriptBox.innerText = 'Network error. Please try again.';
                setUIState('Ready');
            }
        }

        // Play the speech returned from backend
        function playSpeech(audioUrl) {
            speechPlayer.src = audioUrl;
            
            speechPlayer.onplay = () => {
                setUIState('Speaking');
            };
            
            speechPlayer.onended = () => {
                setUIState('Ready');
            };

            speechPlayer.onerror = () => {
                console.error("Audio playback error");
                setUIState('Ready');
            };

            speechPlayer.play().catch(e => {
                console.error("Playback block:", e);
                setUIState('Ready');
            });
        }
    </script>
</body>
</html>
